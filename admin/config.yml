backend:
  name: github
  repo: techservicesaandt-bot/A-T-Technical-Services-LLC
  branch: main
  base_url: https://github-auth-callback.vercel.app
  auth_endpoint: api/auth

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "settings"
    label: "Global Settings"
    delete: false
    editor:
      preview: false
    files:
      - name: "general"
        label: "General Info & Links"
        file: "data/settings.json"
        fields:
          - { label: "Site Title", name: "site_title", widget: "string" }
          - { label: "Phone Number", name: "phone", widget: "string" }
          - { label: "Email Address", name: "email", widget: "string" }
          - { label: "Warehouse Address", name: "location", widget: "string" }
          - { label: "Google Maps Link", name: "google_maps_link", widget: "string" }
          - { label: "Portfolio Download Link", name: "portfolio_link", widget: "string" }
          - name: "socials"
            label: "Social Media Links"
            widget: "object"
            fields:
              - { label: "Instagram", name: "instagram", widget: "string" }
              - { label: "Facebook", name: "facebook", widget: "string" }
              - { label: "LinkedIn", name: "linkedin", widget: "string" }

  - name: "projects"
    label: "Projects & Services"
    delete: false
    editor:
      preview: false
    files:
      - name: "data"
        label: "Main Projects Data"
        file: "data.json"
        fields:
          - label: "Events"
            name: "events"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Tagline", name: "tagline", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Projects List"
                name: "projects"
                widget: "list"
                fields:
                  - { label: "ID", name: "id", widget: "string" }
                  - { label: "Project Name", name: "title", widget: "string" }
                  - { label: "Category", name: "category", widget: "string" }
                  - { label: "Year", name: "year", widget: "string" }
                  - { label: "Location", name: "location", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Thumbnail", name: "thumbnail", widget: "image" }
                  - { label: "Gallery", name: "gallery", widget: "list", field: { label: "Image", name: "image", widget: "image" } }

          - label: "Exhibitions"
            name: "exhibitions"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Tagline", name: "tagline", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Projects List"
                name: "projects"
                widget: "list"
                fields:
                  - { label: "ID", name: "id", widget: "string" }
                  - { label: "Project Name", name: "title", widget: "string" }
                  - { label: "Category", name: "category", widget: "string" }
                  - { label: "Year", name: "year", widget: "string" }
                  - { label: "Location", name: "location", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Thumbnail", name: "thumbnail", widget: "image" }
                  - { label: "Gallery", name: "gallery", widget: "list", field: { label: "Image", name: "image", widget: "image" } }

          - label: "Fitout"
            name: "fitout"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Tagline", name: "tagline", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Projects List"
                name: "projects"
                widget: "list"
                fields:
                  - { label: "ID", name: "id", widget: "string" }
                  - { label: "Project Name", name: "title", widget: "string" }
                  - { label: "Category", name: "category", widget: "string" }
                  - { label: "Year", name: "year", widget: "string" }
                  - { label: "Location", name: "location", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Thumbnail", name: "thumbnail", widget: "image" }
                  - { label: "Gallery", name: "gallery", widget: "list", field: { label: "Image", name: "image", widget: "image" } }

  - name: "rentals"
    label: "Furniture Rentals"
    folder: "data"
    extension: "json"
    format: "json"
    create: true
    editor:
      preview: false
    files:
      - name: "catalog"
        label: "Rentals Catalog"
        file: "data/rentals.json"
        fields:
          - label: "Product List"
            name: "products"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Product Name", name: "name", widget: "string" }
              - label: "Category"
                name: "category"
                widget: "select"
                options: ["chairs", "sofas", "barstools", "tables", "office", "devices", "another items"]
              - { label: "Availability", name: "availability", widget: "select", options: ["available", "limited", "out_of_stock"] }
              - { label: "Image", name: "img", widget: "image" }
              - { label: "Tags", name: "tags", widget: "list", field: { label: "Tag", name: "tag", widget: "string" } }

