<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A&T | Local Project Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #0a0a0a;
            --bg-card: #141414;
            --bg-sidebar: #0f0f0f;
            --accent: #E31E24;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background-color: var(--bg-deep); color: var(--text-primary); height: 100vh; overflow: hidden; }

        /* --- CONNECTION SCREEN --- */
        #connect-overlay {
            position: fixed; inset: 0; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .connect-card {
            background: var(--bg-card); padding: 3rem; border-radius: 20px; border: 1px solid var(--border);
            width: 100%; max-width: 500px; text-align: center;
        }

        /* --- DASHBOARD LAYOUT --- */
        #app { display: none; height: 100vh; grid-template-columns: 280px 1fr; }
        aside { background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 2rem 1.5rem; }
        nav { flex: 1; }
        .nav-section { margin-bottom: 2rem; }
        .nav-section h3 { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 1rem; padding-left: 0.5rem; }
        .nav-item { display: flex; align-items: center; padding: 12px 1rem; color: var(--text-secondary); text-decoration: none; border-radius: var(--radius); margin-bottom: 4px; transition: var(--transition); cursor: pointer; }
        .nav-item.active { background: linear-gradient(90deg, rgba(227, 30, 36, 0.1) 0%, transparent 100%); color: white; border-left: 3px solid var(--accent); }
        .nav-item i { width: 20px; margin-right: 12px; }

        main { padding: 2.5rem; overflow-y: auto; background: #000; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; position: sticky; top: 0; background: #000; z-index: 10; padding-bottom: 1rem; }
        .btn-save { background: white; color: black; border: none; padding: 12px 30px; border-radius: 30px; font-weight: 700; cursor: pointer; transition: var(--transition); }
        .btn-save:hover { background: var(--accent); color: white; transform: scale(1.05); }

        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .section-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 1.5rem; }

        .form-row { margin-bottom: 1.2rem; }
        .form-row label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; }
        input, textarea, select { width: 100%; background: var(--glass); border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: white; outline: none; }
        input:focus { border-color: var(--accent); }

        .img-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .img-item { width: 100px; height: 100px; border-radius: 8px; position: relative; overflow: hidden; border: 1px solid var(--border); }
        .img-item img { width: 100%; height: 100%; object-fit: cover; }
        .img-item .remove-btn { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.5); border: none; color: white; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; }
        .img-item .remove-btn:hover { background: var(--accent); }

        .add-box { width: 100px; height: 100px; border: 2px dashed var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-secondary); }
        .add-box:hover { border-color: var(--accent); color: var(--accent); }

        #status-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 30px; border-radius: 30px; background: var(--accent); color: white; font-weight: 600; display: none; z-index: 2000; box-shadow: 0 10px 30px rgba(227,30,36,0.5); }
    </style>
</head>
<body>

    <div id="setup-overlay" style="display:none;">
        <div class="card">
            <h2>Initializing Editor...</h2>
        </div>
    </div>

    <div id="app">
        <aside>
            <div class="logo-area" style="margin-bottom: 3rem;">
                <img src="logo.svg" style="height: 40px;">
            </div>
            <nav>
                <div class="nav-section">
                    <h3>General</h3>
                    <div class="nav-item active" onclick="switchTab('homepage', this)"><i class="fa-solid fa-house"></i> Home Content</div>
                    <div class="nav-item" onclick="switchTab('rentals', this)"><i class="fa-solid fa-couch"></i> Furniture Rentals</div>
                    <div class="nav-item" onclick="switchTab('team', this)"><i class="fa-solid fa-people-group"></i> Team</div>
                    <div class="nav-item" onclick="switchTab('inbox', this)"><i class="fa-solid fa-inbox"></i> Inbox</div>
                    <div class="nav-item" onclick="switchTab('settings', this)"><i class="fa-solid fa-gears"></i> Form Settings</div>
                </div>
                <div class="nav-section">
                    <h3>Services Portfolio</h3>
                    <div id="service-links"></div>
                </div>
            </nav>
        </aside>

        <main>
            <header>
                <div>
                    <h2 id="view-title">Dashboard</h2>
                    <p id="folder-path" style="font-size: 0.8rem; color: var(--text-secondary);"></p>
                </div>
                <button class="btn-save" onclick="saveAll()">
                    <i class="fa-solid fa-floppy-disk"></i> SAVE CHANGES
                </button>
            </header>

            <div id="editor-body"></div>
        </main>
    </div>

    <div id="status-bar"></div>

    <script>
        let siteData = null;
        let rentalData = null;
        let currentTab = 'homepage';

        // --- INITIALIZATION ---
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const resp = await fetch('data.json');
                siteData = await resp.json();
                
                const rResp = await fetch('data/rentals.json');
                rentalData = await rResp.json();
                
                document.getElementById('setup-overlay').style.display = 'none';
                document.getElementById('app').style.display = 'grid';
                
                renderServiceLinks();
                switchTab('homepage', document.querySelector('.nav-item'));
                showStatus("Connected Successfully!");
            } catch (err) {
                console.error(err);
                alert("Could not load data from the server. Please ensure start-admin.bat is running.");
            }
        });

        function renderServiceLinks() {
            const container = document.getElementById('service-links');
            container.innerHTML = '';
            const services = [
                { k: 'events', n: 'Events' }, { k: 'exhibitions', n: 'Exhibitions' },
                { k: 'fitout', n: 'Fitting out & Furniture' }, { k: 'signages', n: 'Signage' },
                { k: 'branding', n: 'Branding' }, { k: 'manufacturing', n: 'Manufacturing' }
            ];
            services.forEach(s => {
                const item = document.createElement('div');
                item.className = 'nav-item';
                item.onclick = () => switchTab('service_' + s.k, item);
                item.innerHTML = `<i class="fa-solid fa-folder-open"></i> ${s.n}`;
                container.appendChild(item);
            });
        }

        function switchTab(tab, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            currentTab = tab;
            renderEditor();
        }

        function renderEditor() {
            const container = document.getElementById('editor-body');
            container.innerHTML = '';

            if (currentTab === 'homepage') {
                renderHomepage(container);
            } else if (currentTab === 'rentals') {
                renderRentals(container);
            } else if (currentTab === 'team') {
                renderTeam(container);
            } else if (currentTab === 'inbox') {
                renderInbox(container);
            } else if (currentTab === 'settings') {
                renderSettings(container);
            } else if (currentTab.startsWith('service_')) {
                renderService(currentTab.split('_')[1], container);
            }
        }

        function renderHomepage(container) {
            document.getElementById('view-title').innerText = "Home Screen Content";
            container.innerHTML = `
                <div class="card">
                    <h4>Hero Header</h4>
                    <div class="form-row">
                        <label>Hero Title</label>
                        <input type="text" value="${siteData.hero.title}" oninput="siteData.hero.title = this.value">
                    </div>
                    <div class="form-row">
                        <label>Hero Tagline</label>
                        <input type="text" value="${siteData.hero.tagline}" oninput="siteData.hero.tagline = this.value">
                    </div>
                </div>
                <div class="card">
                    <h4>Who We Are (About Section)</h4>
                    <div class="form-row">
                        <label>Title</label>
                        <input type="text" value="${siteData.about_snippet.title}" oninput="siteData.about_snippet.title = this.value">
                    </div>
                    <div class="form-row">
                        <label>Text Description</label>
                        <textarea rows="5" oninput="siteData.about_snippet.text = this.value">${siteData.about_snippet.text}</textarea>
                    </div>
                </div>
            `;
        }

        function renderService(key, container) {
            const service = siteData[key];
            document.getElementById('view-title').innerText = `${service.title} Portfolio`;
            
            let projectsHtml = service.projects.map((p, idx) => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <h4 style="color:var(--accent)">Project ${idx+1}</h4>
                        <button onclick="removeProject('${key}', ${idx})" style="background:none; border:none; color:#555; cursor:pointer;"><i class="fa-solid fa-trash"></i></button>
                    </div>
                    <div class="form-row"><label>Title</label><input type="text" value="${p.title}" oninput="siteData.${key}.projects[${idx}].title = this.value"></div>
                    <div class="form-row"><label>Location</label><input type="text" value="${p.location}" oninput="siteData.${key}.projects[${idx}].location = this.value"></div>
                    <div class="form-row"><label>Images</label>
                        <div class="img-grid">
                            ${p.gallery.map((img, iIdx) => `
                                <div class="img-item">
                                    <img src="${img}">
                                    <button class="remove-btn" onclick="removeImage('${key}', ${idx}, ${iIdx})">×</button>
                                </div>
                            `).join('')}
                            <div class="add-box" onclick="importImage('${key}', ${idx})"><i class="fa-solid fa-plus"></i></div>
                        </div>
                    </div>
                </div>
            `).join('');

            container.innerHTML = `
                <div class="form-row" style="margin-bottom:20px;">
                    <button class="btn-save" style="background:#222; color:white; font-size:0.8rem;" onclick="addProject('${key}')">+ ADD NEW PROJECT</button>
                </div>
                <div class="section-grid">${projectsHtml}</div>
            `;
        }

        function renderRentals(container) {
            document.getElementById('view-title').innerText = "Furniture Rentals Inventory";
            if (!Array.isArray(rentalData)) {
                container.innerHTML = `<div class="card">Error: Rental data is not formatted as an array.</div>`;
                return;
            }
            
            let productsHtml = rentalData.map((p, idx) => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 10px;">
                        <h4 style="color:var(--accent); font-size: 1.1rem;">${p.name || 'New Product'}</h4>
                        <button onclick="removeRental(${idx})" class="btn-save" style="background: rgba(227,30,36,0.1); color: var(--accent); padding: 5px 15px; font-size: 0.7rem;">
                            <i class="fa-solid fa-trash"></i> DELETE PRODUCT
                        </button>
                    </div>
                    
                    <div class="form-row">
                        <label>Product Name</label>
                        <input type="text" value="${p.name || ''}" placeholder="e.g. Luxury Leather Sofa" oninput="rentalData[${idx}].name = this.value">
                    </div>

                    <div class="form-row">
                        <label>Category</label>
                        <select onchange="rentalData[${idx}].category = this.value">
                            ${['chairs','sofas','barstools','tables','office','devices','another items'].map(c => `<option value="${c}" ${p.category===c?'selected':''}>${c}</option>`).join('')}
                        </select>
                    </div>

                    <div class="form-row">
                        <label>Product Photo</label>
                        <div style="background: var(--glass); border-radius: 8px; padding: 10px; text-align: center;">
                            ${p.img && p.img !== 'https://via.placeholder.com/300' ? `
                                <div style="position:relative; width: 100%; height: 180px; margin-bottom: 10px; border-radius: 5px; overflow: hidden; border: 1px solid var(--border);">
                                    <img src="${p.img}" style="width:100%; height:100%; object-fit: contain; background: #000;">
                                    <button onclick="deleteRentalPhoto(${idx})" style="position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.7); color:white; border:none; width:30px; height:30px; border-radius:50%; cursor:pointer;"><i class="fa-solid fa-xmark"></i></button>
                                </div>
                                <button class="btn-save" style="width:100%; background: #222; color:white; font-size: 0.75rem;" onclick="importRentalImage(${idx})">REPLACE PHOTO</button>
                            ` : `
                                <div class="add-box" style="width:100%; height: 180px; margin-bottom: 10px;" onclick="importRentalImage(${idx})">
                                    <div style="text-align:center;">
                                        <i class="fa-solid fa-cloud-arrow-up" style="font-size: 2rem; display:block; margin-bottom:5px;"></i>
                                        <span>Click to Upload Photo</span>
                                    </div>
                                </div>
                            `}
                        </div>
                    </div>
                </div>
            `).join('');

            container.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
                    <p style="color:var(--text-secondary)">Manage your furniture and equipment catalog.</p>
                    <button class="btn-save" style="background:var(--accent); color:white;" onclick="addRental()">
                        <i class="fa-solid fa-plus"></i> ADD NEW PRODUCT
                    </button>
                </div>
                <div class="section-grid">${productsHtml}</div>
            `;
        }

        function renderTeam(container) {
            document.getElementById('view-title').innerText = "Our Team";
            let teamHtml = siteData.team.map((m, idx) => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 10px;">
                        <h4 style="color:var(--accent); font-size: 1.1rem;">${m.name || 'New Member'}</h4>
                        <button onclick="removeTeamMember(${idx})" class="btn-save" style="background: rgba(227,30,36,0.1); color: var(--accent); padding: 5px 15px; font-size: 0.7rem;">
                            <i class="fa-solid fa-trash"></i> REMOVE
                        </button>
                    </div>
                    
                    <div class="form-row">
                        <label>Full Name</label>
                        <input type="text" value="${m.name || ''}" oninput="siteData.team[${idx}].name = this.value">
                    </div>

                    <div class="form-row">
                        <label>Position</label>
                        <input type="text" value="${m.position || ''}" oninput="siteData.team[${idx}].position = this.value">
                    </div>

                    <div class="form-row">
                        <label>Short Bio / Message</label>
                        <textarea rows="3" oninput="siteData.team[${idx}].bio = this.value">${m.bio || ''}</textarea>
                    </div>

                    <div class="form-row">
                        <label>Photo</label>
                        <div style="background: var(--glass); border-radius: 8px; padding: 10px; text-align: center;">
                            <div style="position:relative; width: 100px; height: 100px; margin: 0 auto 10px; border-radius: 50%; overflow: hidden; border: 2px solid var(--accent);">
                                <img src="${m.img}" style="width:100%; height:100%; object-fit: cover;">
                            </div>
                            <button class="btn-save" style="width:100%; background: #222; color:white; font-size: 0.75rem;" onclick="importTeamPhoto(${idx})">UPLOAD NEW PHOTO</button>
                        </div>
                    </div>
                </div>
            `).join('');

            container.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
                    <p style="color:var(--text-secondary)">Manage your professional team members.</p>
                    <button class="btn-save" style="background:var(--accent); color:white;" onclick="addTeamMember()">
                        <i class="fa-solid fa-plus"></i> ADD NEW MEMBER
                    </button>
                </div>
                <div class="section-grid">${teamHtml}</div>
            `;
        }

        function renderInbox(container) {
            document.getElementById('view-title').innerText = "Client Inquiries";
            container.innerHTML = `
                <div class="card">
                    <div style="text-align:center; padding: 3rem 1rem;">
                        <i class="fa-solid fa-envelope-open-text" style="font-size: 3rem; color: var(--accent); margin-bottom: 1.5rem; display:block;"></i>
                        <h3 style="margin-bottom: 1rem;">Your Formspree Inbox</h3>
                        <p style="color:var(--text-secondary); margin-bottom: 2rem; max-width: 500px; margin-left:auto; margin-right:auto;">
                            All requests from your website are being sent to <strong>info@at-s.ae</strong>.<br><br>
                            If you are using the free version of Formspree, you can view the full inbox history directly on their dashboard.
                        </p>
                        <a href="https://formspree.io/forms" target="_blank" class="btn-save" style="background: var(--accent); color: white; display: inline-block; text-decoration: none;">
                            <i class="fa-solid fa-external-link"></i> OPEN FORMSPREE INBOX
                        </a>
                    </div>
                </div>
                <div id="leads-list"></div>
            `;
        }

        function renderSettings(container) {
            document.getElementById('view-title').innerText = "App & Form Settings";
            const p = siteData.placeholders || {};
            container.innerHTML = `
                <div class="card" style="max-width: 600px; margin: 0 auto 2rem;">
                    <h4>Email Connection (Formspree)</h4>
                    <p style="color:var(--text-secondary); font-size: 0.8rem; margin-bottom: 1.5rem;">Enter your Formspree Form ID to receive emails when customers submit the quote form.</p>
                    <div class="form-row">
                        <label>Formspree Form ID</label>
                        <input type="text" value="${siteData.formspree_id || 'mldgjzda'}" placeholder="e.g. mldgjzda" oninput="siteData.formspree_id = this.value">
                    </div>
                    <p style="font-size:0.75rem; color: #555;"><i>Note: After changing this, you must "Save Changes" and upload your data.json to GitHub for the live site to update.</i></p>
                </div>

                <div class="card" style="max-width: 600px; margin: 0 auto;">
                    <h4>Edit Form Placeholders</h4>
                    <p style="color:var(--text-secondary); font-size: 0.8rem; margin-bottom: 2rem;">Adjust the text that appears as labels and hints in your contact form.</p>
                    
                    <div class="form-row">
                        <label>Name Field Label / Hint</label>
                        <input type="text" value="${p.contact_name || ''}" oninput="siteData.placeholders.contact_name = this.value">
                    </div>
                    <div class="form-row">
                        <label>Email Field Label / Hint</label>
                        <input type="text" value="${p.contact_email || ''}" oninput="siteData.placeholders.contact_email = this.value">
                    </div>
                    <div class="form-row">
                        <label>Company Field Label / Hint</label>
                        <input type="text" value="${p.contact_company || ''}" oninput="siteData.placeholders.contact_company = this.value">
                    </div>
                    <div class="form-row">
                        <label>Message Field Label / Placeholder</label>
                        <textarea rows="3" oninput="siteData.placeholders.contact_message = this.value">${p.contact_message || ''}</textarea>
                    </div>
                    <div class="form-row">
                        <label>Submit Button Text</label>
                        <input type="text" value="${p.contact_submit || ''}" oninput="siteData.placeholders.contact_submit = this.value">
                    </div>
                </div>
            `;
        }

        // Helper to remove photo from rental
        function deleteRentalPhoto(idx) {
            if(confirm("Are you sure you want to remove this photo?")) {
                rentalData[idx].img = "https://via.placeholder.com/300";
                renderEditor();
                showStatus("Photo removed from product.");
            }
        }

        // --- UPLOAD HELPER ---
        function uploadFile(callback) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = e => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const base64 = ev.target.result;
                    const fileName = `img_${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.-]/g, '_')}`;
                    try {
                        const res = await fetch('/api/upload', {
                            method: 'POST',
                            body: JSON.stringify({ filename: fileName, base64: base64 })
                        });
                        if (res.ok) {
                            callback(`assets/uploads/${fileName}`);
                        } else {
                            alert("Upload failed. Ensure server.ps1 is running.");
                        }
                    } catch(err) {
                        alert("Error uploading: " + err);
                    }
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        // --- ACTIONS ---
        function importImage(key, pIdx) {
            uploadFile(path => {
                siteData[key].projects[pIdx].gallery.push(path);
                renderEditor();
                showStatus("Image added!");
            });
        }

        function importRentalImage(idx) {
            uploadFile(path => {
                rentalData[idx].img = path;
                renderEditor();
                showStatus("Product image updated!");
            });
        }

        function importTeamPhoto(idx) {
            uploadFile(path => {
                siteData.team[idx].img = path;
                renderEditor();
                showStatus("Team photo uploaded!");
            });
        }

        function removeImage(key, pIdx, iIdx) {
            siteData[key].projects[pIdx].gallery.splice(iIdx, 1);
            renderEditor();
        }

        function addProject(key) {
            siteData[key].projects.unshift({
                id: "new-" + Date.now(),
                title: "New Project",
                location: "Dubai",
                year: "2026",
                gallery: []
            });
            renderEditor();
        }

        function removeProject(key, idx) {
            if(confirm("Delete this project?")) {
                siteData[key].projects.splice(idx, 1);
                renderEditor();
            }
        }

        function addRental() {
            rentalData.unshift({
                id: "rent-" + Date.now(),
                name: "New Item",
                category: "chairs",
                availability: "available",
                img: "https://via.placeholder.com/300",
                tags: []
            });
            renderEditor();
        }

        function removeRental(idx) {
            if(confirm("Delete this item?")) {
                rentalData.splice(idx, 1);
                renderEditor();
            }
        }

        function addTeamMember() {
            siteData.team.push({
                name: "New Member",
                position: "Staff",
                bio: "Dedicated professional.",
                img: "https://i.pravatar.cc/600?img=50"
            });
            renderEditor();
        }

        function removeTeamMember(idx) {
            if(confirm("Remove this team member?")) {
                siteData.team.splice(idx, 1);
                renderEditor();
            }
        }

        async function saveAll() {
            try {
                // Save data.json via server API
                const s1 = await fetch('/api/save', {
                    method: 'POST',
                    body: JSON.stringify({ file: 'data.json', data: siteData })
                });

                // Save rentals via server API
                const s2 = await fetch('/api/save', {
                    method: 'POST',
                    body: JSON.stringify({ file: 'data/rentals.json', data: rentalData })
                });

                if(s1.ok && s2.ok) {
                    showStatus("✅ SAVED TO DISK!");
                    alert("Changes saved locally! Remember to push your changes to GitHub to update the live site.");
                } else {
                    throw new Error("Server error while saving.");
                }
            } catch (err) {
                console.error(err);
                alert("Error saving: " + err.message);
            }
        }

        function showStatus(msg) {
            const bar = document.getElementById('status-bar');
            bar.innerText = msg;
            bar.style.display = 'block';
            setTimeout(() => bar.style.display='none', 4000);
        }
    </script>
</body>
</html>
